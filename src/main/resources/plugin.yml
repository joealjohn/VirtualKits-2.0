name: VirtualKit
version: "${project.version}"
main: dev.ace.virtualkit.VirtualKits
author: ACE
api-version: "1.19"
softdepend:
  - PlaceholderAPI


permissions:
  virtualkit.admin:
    description: Full administrative access to VirtualKit
    children:
      virtualkit.use: true
      virtualkit.staff: true
      virtualkit.editkitroom: true
  virtualkit.staff:
    description: Staff moderation permissions
    children:
      virtualkit.use: true
  virtualkit.use:
    description: Basic kit usage permissions
    children:
      virtualkit.menu: true
      virtualkit.copykit: true
      virtualkit.sharekit: true
      virtualkit.shareenderchest: true
      virtualkit.swapkit: true
      virtualkit.deletekit: true
      virtualkit.publickit: true
      virtualkit.kit: true
      virtualkit.enderchest: true
      virtualkit.viewenderchest: true
      virtualkit.regear: true
      virtualkit.heal: true
      virtualkit.repair: true
      virtualkit.rekitonrespawn: true
      virtualkit.rekitonkill: true
      virtualkit.autorekit: true
  virtualkit.autorekit:
    description: Automatically receive kit when entering a configured world
    default: true
  virtualkit.autorekit.bypass:
    description: Bypass automatic kit loading on world join
    default: false


commands:

  virtualkit:
    usage: /<command>
    permission: virtualkit.admin
    aliases:
      - vk
      - perplayerkit

  aboutvirtualkit:
    usage: /<command>
    default: true

  kitroom:
    usage: /<command>
    permission: virtualkit.admin

  kit:
    usage: /<command>
    permission: virtualkit.menu
    aliases: k

  copykit:
    usage: /<command>
    permission: virtualkit.copykit

  sharekit:
    usage: /<command>
    permission: virtualkit.sharekit

  swapkit:
    usage: /<command>
    permission: virtualkit.swapkit

  deletekit:
    usage: /<command>
    permission: virtualkit.deletekit

  inspectkit:
    usage: /<command>
    permission: virtualkit.staff

  inspectec:
    usage: /<command>
    permission: virtualkit.staff

  publickit:
    usage: /<command>
    permission: virtualkit.publickit
    aliases:
      - pk
      - premadekit

  k1:
    usage: /<command>
    permission: virtualkit.kit
    aliases: kit1
  k2:
    usage: /<command>
    permission: virtualkit.kit
    aliases: kit2
  k3:
    usage: /<command>
    permission: virtualkit.kit
    aliases: kit3
  k4:
    usage: /<command>
    permission: virtualkit.kit
    aliases: kit4
  k5:
    usage: /<command>
    permission: virtualkit.kit
    aliases: kit5
  k6:
    usage: /<command>
    permission: virtualkit.kit
    aliases: kit6
  k7:
    usage: /<command>
    permission: virtualkit.kit
    aliases: kit7
  k8:
    usage: /<command>
    permission: virtualkit.kit
    aliases: kit8
  k9:
    usage: /<command>
    permission: virtualkit.kit
    aliases: kit9

  ec1:
    usage: /<command>
    permission: virtualkit.enderchest
    aliases: enderchest1
  ec2:
    usage: /<command>
    permission: virtualkit.enderchest
    aliases: enderchest2
  ec3:
    usage: /<command>
    permission: virtualkit.enderchest
    aliases: enderchest3
  ec4:
    usage: /<command>
    permission: virtualkit.enderchest
    aliases: enderchest4
  ec5:
    usage: /<command>
    permission: virtualkit.enderchest
    aliases: enderchest5
  ec6:
    usage: /<command>
    permission: virtualkit.enderchest
    aliases: enderchest6
  ec7:
    usage: /<command>
    permission: virtualkit.enderchest
    aliases: enderchest7
  ec8:
    usage: /<command>
    permission: virtualkit.enderchest
    aliases: enderchest8
  ec9:
    usage: /<command>
    permission: virtualkit.enderchest
    aliases: enderchest9

  savepublickit:
    usage: /<command> <id>
    permission: virtualkit.admin

  regear:
    usage: /<command>
    permission: virtualkit.regear
    aliases:
      - rg
  heal:
    usage: /<command>
    permission: virtualkit.heal

  repair:
    usage: /<command>
    permission: virtualkit.repair

